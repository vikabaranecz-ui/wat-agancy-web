<html lang="en">

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Packages — WAT? Agency</title>

<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--red:#FF3D1F;--ink:#111;--bg:#F5F2EE;--border:#E3DFD8}
body{
  font-family:'Inter',sans-serif;
  background:var(--bg);color:var(--ink);
  background-image:radial-gradient(circle,rgba(0,0,0,0.06) 1px,transparent 1px);
  background-size:24px 24px;
  min-height:100vh;padding:80px 24px 60px;
}
.page{max-width:1220px;margin:0 auto}

/* Lang toggle */
.lang-toggle{
  position:fixed;top:24px;right:24px;
  display:flex;background:#fff;
  border:1px solid var(--border);
  border-radius:8px;overflow:hidden;
  z-index:100;box-shadow:0 2px 16px rgba(0,0,0,.08)
}
.lang-btn{
  padding:9px 18px;
  font-family:'Montserrat',sans-serif;
  font-weight:800;font-size:11px;letter-spacing:1.5px;
  border:none;cursor:pointer;background:transparent;
  color:#999;transition:background .2s,color .2s
}
.lang-btn.active{background:var(--red);color:#fff}

/* Header */
.page-header{text-align:center;margin-bottom:60px}
.page-header h1{
  font-family:'Montserrat',sans-serif;
  font-weight:900;font-size:clamp(36px,5vw,64px);
  letter-spacing:-2px;line-height:1.1;margin-bottom:14px
}
.page-header p{font-size:15px;color:#888;letter-spacing:.3px}

/* Grid */
.cards-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:24px;align-items:start}

/* Card */
.card{
  background:#fff;border:1px solid var(--border);
  border-radius:24px;padding:36px;
  position:relative;transition:transform .3s,box-shadow .3s;will-change:transform
}
.card:hover{transform:translateY(-6px);box-shadow:0 24px 64px rgba(0,0,0,.10)}
.card-dark{background:#111;border-color:#222;color:#fff}

/* Popular badge */
.popular-badge{
  position:absolute;top:-13px;left:24px;
  background:var(--red);color:#fff;
  font-family:'Montserrat',sans-serif;
  font-weight:800;font-size:9px;letter-spacing:2px;text-transform:uppercase;
  padding:5px 14px;border-radius:4px
}

/* Card typography */
.card-num{
  font-family:'Montserrat',sans-serif;
  font-weight:800;font-size:10px;letter-spacing:3px;
  color:var(--red);margin-bottom:10px
}
.card-name{
  font-family:'Montserrat',sans-serif;
  font-weight:900;font-size:28px;line-height:1.1;margin-bottom:6px
}
.card-dark .card-name{color:#fff}
.card-tagline{font-style:italic;font-size:13px;color:#888;margin-bottom:20px}
.card-dark .card-tagline{color:rgba(255,255,255,.5)}
.card-price{
  font-family:'Montserrat',sans-serif;
  font-weight:900;font-size:54px;
  color:var(--red);letter-spacing:-2px;line-height:1;margin-bottom:4px
}
.card-price-sub{font-size:12px;color:#999;margin-bottom:14px}
.card-dark .card-price-sub{color:rgba(255,255,255,.4)}
.deadline-badge{
  display:inline-block;
  background:rgba(255,61,31,.08);color:var(--red);
  font-family:'Montserrat',sans-serif;
  font-weight:700;font-size:11px;
  padding:5px 12px;border-radius:4px;margin-bottom:20px
}
.card-dark .deadline-badge{background:rgba(255,61,31,.18)}
.divider{border:none;border-top:1px solid var(--border);margin:20px 0}
.card-dark .divider{border-color:rgba(255,255,255,.1)}

/* Chips */
.chips{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:16px}
.chip{
  display:flex;align-items:center;gap:8px;
  background:rgba(255,61,31,.05);
  border:1px solid rgba(255,61,31,.12);
  border-radius:8px;padding:9px 12px;
  font-size:12px;font-weight:600;color:#111
}
.chip.full{grid-column:span 2}
.card-dark .chip{background:rgba(255,255,255,.07);border-color:rgba(255,255,255,.1);color:#fff}
.chip-icon{flex-shrink:0;display:flex;align-items:center;line-height:1}
.chip-icon svg{display:block}
.chip .chip-icon svg{stroke:var(--red)}
.card-dark .chip .chip-icon svg{stroke:rgba(255,255,255,.7)}

/* Not included */
.not-included{border-top:1px dashed var(--border);margin-top:12px;padding-top:12px}
.card-dark .not-included{border-color:rgba(255,255,255,.15)}
.not-item{display:flex;align-items:center;gap:8px;font-size:12px;color:#BBBBBB;margin-bottom:6px}
.not-item:last-child{margin-bottom:0}
.not-item svg{stroke:#BBBBBB;flex-shrink:0}

/* All included */
.all-included{
  display:flex;align-items:center;gap:8px;
  font-size:13px;font-weight:600;color:#22C55E;
  margin-top:12px;padding-top:12px;
  border-top:1px dashed rgba(34,197,94,.3)
}
.all-included svg{flex-shrink:0}

/* CTA */
.cta{
  width:100%;padding:15px;
  font-family:'Montserrat',sans-serif;
  font-size:13px;font-weight:800;letter-spacing:.5px;text-transform:uppercase;
  border:none;cursor:pointer;border-radius:10px;
  margin-top:20px;position:relative;overflow:hidden
}
.cta::after{
  content:'';position:absolute;inset:0;
  background:rgba(255,255,255,.15);
  transform:translateX(-100%) skewX(-15deg);
  transition:transform .4s ease
}
.cta:hover::after{transform:translateX(110%) skewX(-15deg)}
.cta-red{background:var(--red);color:#fff}
.cta-white{background:#fff;color:#111}

/* Guarantees */
.guarantees{
  display:flex;gap:32px;align-items:center;
  justify-content:center;flex-wrap:wrap;
  border-top:1px solid var(--border);
  padding-top:32px;margin-top:48px
}
.g-item{display:flex;align-items:center;gap:10px;font-size:13px;font-weight:600;color:#555}
.g-item svg{stroke:var(--red);flex-shrink:0}

/* Note */
.note{font-size:13px;color:#999;text-align:center;margin-top:24px;line-height:1.6}

/* Responsive */
@media(max-width:1024px){.cards-grid{grid-template-columns:1fr 1fr}}
@media(max-width:768px){
  body{padding:40px 16px 40px}
  .cards-grid{grid-template-columns:1fr}
  .chips{grid-template-columns:1fr}
  .chip.full{grid-column:span 1}
  .guarantees{flex-direction:column;gap:16px;align-items:flex-start;padding-left:8px}
  .lang-toggle{top:16px;right:16px}
}
</style>
</head>

      ['highlights','6 Highlights covers',false],

    ],
    mid: [
      ['gallery','5-pagina website + galerij',true],
      ['seo','Basis on-page SEO',false],
      ['logo','Logo — 2 varianten (Canva)',true],
      ['brandbook','Huisstijlgids PDF',false],
      ['posts','6 kant-en-klare posts (IG + FB)',false],
      ['story','3 Story-sjablonen',false],
      ['flyer','A5 flyer drukklaar',false],
    ],
    top: [
      ['gallery','Tot 9 pagina\'s + blog',true],
      ['booklet','Klantenbooklet 6 pag. PDF',true],
      ['quote','Sjabloon commercieel voorstel',true],
      ['rollup','Roll-up banner of bannerset',true],

/* ── STATIC PACKAGE CONFIG ── */
const pkgStatic = [
  {num:'01 / 03', name:'Start Online',  price:'€1,200', ddays:'12', dark:false, popular:false, ctaCls:'cta-red'},
  {num:'02 / 03', name:'Digital Foundation', price:'€2,100', ddays:'18', dark:true,  popular:true,  ctaCls:'cta-white'},
  {num:'03 / 03', name:'Complete Presence',  price:'€3,100', ddays:'24', dark:false, popular:false, ctaCls:'cta-red'},
];

/* ── HELPERS ── */
function chip([key, label, full]) {
  return `<div class="chip${full?' full':''}"><span class="chip-icon">${ic[key]}</span><span>${label}</span></div>`;
}
function notItem(label) {
  return `<div class="not-item">${ic.x}<span>${label}</span></div>`;
}

/* ── RENDER ── */
let lang = 'en';

function render() {
  const tr = t[lang];

  // Header
  document.getElementById('hdr-h1').textContent = tr.h1;
  document.getElementById('hdr-p').textContent  = tr.sub;

  // Note
  document.getElementById('note').innerHTML = tr.note;

  // Guarantees
  const gSvgs = [ic.glock, ic.gdoc, ic.gclock, ic.gcard];
  document.getElementById('guarantees').innerHTML = tr.g.map((label, i) =>
    `<div class="g-item">${gSvgs[i]}${label}</div>`
  ).join('');

  // Cards
  const chipSets = [
    tr.base,
    [...tr.base, ...tr.mid],
    [...tr.base, ...tr.mid, ...tr.top],
  ];

  const grid = document.getElementById('cards');
  grid.innerHTML = '';

  pkgStatic.forEach((s, i) => {
    const p   = tr.pkgs[i];
    const chips = chipSets[i].map(chip).join('');
    const notHtml = p.not.map(notItem).join('');

    const el = document.createElement('div');
    el.className = 'card' + (s.dark ? ' card-dark' : '');
    el.innerHTML = `
      ${s.popular ? `<div class="popular-badge">${tr.popular}</div>` : ''}
      <div class="card-num">${s.num}</div>
      <div class="card-name">${s.name}</div>
      <div class="card-tagline">${p.tagline}</div>
      <div class="card-price">${s.price}</div>
      <div class="card-price-sub">${tr.priceSub}</div>
      <div class="deadline-badge">${tr.deadline} ${s.ddays} ${tr.days}</div>
      <hr class="divider">
      <div class="chips">${chips}</div>
      ${notHtml ? `<div class="not-included">${notHtml}</div>` : ''}
      ${p.not.length === 0 ? `<div class="all-included">${ic.check}<span>${tr.allIncluded}</span></div>` : ''}
      <button class="cta ${s.ctaCls}">${p.cta}</button>
    `;
    grid.appendChild(el);
  });

  // Re-attach 3D tilt
  document.querySelectorAll('.card').forEach(card => {
    card.addEventListener('mousemove', e => {
      const r = card.getBoundingClientRect();
      const x = (e.clientX - r.left) / r.width - .5;
      const y = (e.clientY - r.top)  / r.height - .5;
      card.style.transform = `perspective(1000px) rotateY(${x*10}deg) rotateX(${-y*10}deg) translateY(-6px)`;
    });
    card.addEventListener('mouseleave', () => { card.style.transform = ''; });
  });
}

function setLang(l) {
  lang = l;
  document.getElementById('btn-en').classList.toggle('active', l === 'en');
  document.getElementById('btn-nl').classList.toggle('active', l === 'nl');
  render();
}

render();
</script>
