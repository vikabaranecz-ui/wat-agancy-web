<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Пакети послуг — WAT? Agency</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,600;0,800;0,900;1,400&family=Inter:wght@400;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--red:#FF3D1F;--ink:#111;--bg:#F5F2EE;--border:#E3DFD8}
body{
  font-family:'Inter',sans-serif;
  background:var(--bg);
  color:var(--ink);
  background-image:radial-gradient(circle,rgba(0,0,0,0.06) 1px,transparent 1px);
  background-size:24px 24px;
  min-height:100vh;
  padding:80px 24px 60px;
}
.page{max-width:1220px;margin:0 auto}

/* Header */
.page-header{text-align:center;margin-bottom:60px}
.page-header h1{
  font-family:'Montserrat',sans-serif;
  font-weight:900;
  font-size:clamp(36px,5vw,64px);
  letter-spacing:-2px;
  line-height:1.1;
  margin-bottom:14px
}
.page-header p{font-size:15px;color:#888;letter-spacing:.3px}

/* Grid */
.cards-grid{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:24px;
  align-items:start
}

/* Card */
.card{
  background:#fff;
  border:1px solid var(--border);
  border-radius:24px;
  padding:36px;
  position:relative;
  transition:transform .3s,box-shadow .3s;
  will-change:transform
}
.card:hover{transform:translateY(-6px);box-shadow:0 24px 64px rgba(0,0,0,.10)}
.card-dark{background:#111;border-color:#222;color:#fff}

/* Popular badge */
.popular-badge{
  position:absolute;
  top:-13px;left:24px;
  background:var(--red);color:#fff;
  font-family:'Montserrat',sans-serif;
  font-weight:800;font-size:9px;
  letter-spacing:2px;text-transform:uppercase;
  padding:5px 14px;border-radius:4px
}

/* Card typography */
.card-num{
  font-family:'Montserrat',sans-serif;
  font-weight:800;font-size:10px;
  letter-spacing:3px;color:var(--red);
  margin-bottom:10px
}
.card-name{
  font-family:'Montserrat',sans-serif;
  font-weight:900;font-size:28px;
  line-height:1.1;margin-bottom:6px
}
.card-dark .card-name{color:#fff}
.card-tagline{font-style:italic;font-size:13px;color:#888;margin-bottom:20px}
.card-dark .card-tagline{color:rgba(255,255,255,.5)}
.card-price{
  font-family:'Montserrat',sans-serif;
  font-weight:900;font-size:54px;
  color:var(--red);letter-spacing:-2px;
  line-height:1;margin-bottom:4px
}
.card-price-sub{font-size:12px;color:#999;margin-bottom:14px}
.card-dark .card-price-sub{color:rgba(255,255,255,.4)}
.deadline-badge{
  display:inline-block;
  background:rgba(255,61,31,.08);
  color:var(--red);
  font-family:'Montserrat',sans-serif;
  font-weight:700;font-size:11px;
  padding:5px 12px;border-radius:4px;
  margin-bottom:20px
}
.card-dark .deadline-badge{background:rgba(255,61,31,.18)}
.divider{border:none;border-top:1px solid var(--border);margin:20px 0}
.card-dark .divider{border-color:rgba(255,255,255,.1)}

/* Chips */
.chips{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:16px}
.chip{
  display:flex;align-items:center;gap:8px;
  background:rgba(255,61,31,.05);
  border:1px solid rgba(255,61,31,.12);
  border-radius:8px;padding:9px 12px;
  font-size:12px;font-weight:600;color:#111
}
.chip.full{grid-column:span 2}
.card-dark .chip{
  background:rgba(255,255,255,.07);
  border-color:rgba(255,255,255,.1);
  color:#fff
}
.chip-icon{flex-shrink:0;display:flex;align-items:center;line-height:1}
.chip-icon svg{display:block}
.chip .chip-icon svg{stroke:var(--red)}
.card-dark .chip .chip-icon svg{stroke:rgba(255,255,255,.7)}

/* Not included */
.not-included{border-top:1px dashed var(--border);margin-top:12px;padding-top:12px}
.card-dark .not-included{border-color:rgba(255,255,255,.15)}
.not-item{
  display:flex;align-items:center;gap:8px;
  font-size:12px;color:#BBBBBB;margin-bottom:6px
}
.not-item:last-child{margin-bottom:0}
.not-item svg{stroke:#BBBBBB;flex-shrink:0}

/* All included */
.all-included{
  display:flex;align-items:center;gap:8px;
  font-size:13px;font-weight:600;color:#22C55E;
  margin-top:12px;padding-top:12px;
  border-top:1px dashed rgba(34,197,94,.3)
}
.all-included svg{flex-shrink:0}

/* CTA */
.cta{
  width:100%;padding:15px;
  font-family:'Montserrat',sans-serif;
  font-size:13px;font-weight:800;letter-spacing:.5px;
  text-transform:uppercase;
  border:none;cursor:pointer;border-radius:10px;
  margin-top:20px;
  position:relative;overflow:hidden;
  transition:opacity .2s
}
.cta::after{
  content:'';position:absolute;inset:0;
  background:rgba(255,255,255,.15);
  transform:translateX(-100%) skewX(-15deg);
  transition:transform .4s ease
}
.cta:hover::after{transform:translateX(110%) skewX(-15deg)}
.cta-red{background:var(--red);color:#fff}
.cta-white{background:#fff;color:#111}

/* Guarantees */
.guarantees{
  display:flex;gap:32px;align-items:center;
  justify-content:center;flex-wrap:wrap;
  border-top:1px solid var(--border);
  padding-top:32px;margin-top:48px
}
.g-item{
  display:flex;align-items:center;gap:10px;
  font-size:13px;font-weight:600;color:#555
}
.g-item svg{stroke:var(--red);flex-shrink:0}

/* Note */
.note{font-size:13px;color:#999;text-align:center;margin-top:24px;line-height:1.6}

/* Responsive */
@media(max-width:1024px){.cards-grid{grid-template-columns:1fr 1fr}}
@media(max-width:768px){
  body{padding:40px 16px 40px}
  .cards-grid{grid-template-columns:1fr}
  .chips{grid-template-columns:1fr}
  .chip.full{grid-column:span 1}
  .guarantees{flex-direction:column;gap:16px;align-items:flex-start;padding-left:8px}
}
</style>
</head>

    <div class="card-tagline">${p.tagline}</div>
    <div class="card-price">${p.price}</div>
    <div class="card-price-sub">одноразово · без прихованих витрат</div>
    <div class="deadline-badge">Дедлайн: ${p.deadline}</div>
    <hr class="divider">
    <div class="chips">${p.chips}</div>
    ${p.not?`<div class="not-included">${p.not}</div>`:''}
    ${p.all?`<div class="all-included">${ic.check}<span>Найповніший пакет — все включено</span></div>`:''}
    <button class="cta ${p.ctaCls}">${p.cta}</button>
  `;
  grid.appendChild(el);
});

// 3D tilt
document.querySelectorAll('.card').forEach(card => {
  card.addEventListener('mousemove', e => {
    const r = card.getBoundingClientRect();
    const x = (e.clientX - r.left) / r.width - .5;
    const y = (e.clientY - r.top) / r.height - .5;
    card.style.transform = `perspective(1000px) rotateY(${x*10}deg) rotateX(${-y*10}deg) translateY(-6px)`;
  });
  card.addEventListener('mouseleave', () => { card.style.transform = ''; });
});
</script>
</body>
</html>
